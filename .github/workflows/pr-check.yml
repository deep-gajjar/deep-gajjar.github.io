name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # Updated to latest version
      
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4 # Updated to latest version
        with:
          node-version: '24'
          cache: 'npm' # Speeds up future runs by caching dependencies

      - name: Install dependencies
        run: npm ci

      - name: Check for build errors
        run: npm run build --if-present

    #   - name: Run tests
    #     run: npm test -- --watchAll=false # Prevents the CI from getting stuck
